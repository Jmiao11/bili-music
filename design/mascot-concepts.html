<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bili Music 彩色小人候选</title>
<style>
  :root {
    --page: #0A0A0B;
    --tile: #1C1C1E;
    --tile-line: rgba(255,255,255,.08);
    --text: #F5F5F7;
    --muted: #A6A6AD;
    --soft: #6F7078;
    --accent: #FB7299;
    --font: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--page);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
  }

  main {
    width: min(1180px, calc(100% - 40px));
    margin: 0 auto;
    padding: 38px 0 46px;
  }

  header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 22px;
    margin-bottom: 22px;
  }

  h1 {
    margin: 0 0 8px;
    font-size: 26px;
    line-height: 1.2;
    font-weight: 650;
    letter-spacing: 0;
  }

  .lead {
    margin: 0;
    max-width: 62ch;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.75;
  }

  .note {
    flex: 0 0 auto;
    color: var(--soft);
    font-size: 12px;
    line-height: 1.6;
    text-align: right;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
  }

  .tile {
    min-height: 318px;
    padding: 20px 20px 18px;
    border: 1px solid var(--tile-line);
    border-radius: 16px;
    background: var(--tile);
    display: grid;
    grid-template-rows: 1fr auto;
    gap: 16px;
  }

  .stage {
    display: grid;
    grid-template-columns: 82px 1fr;
    align-items: center;
    gap: 18px;
    min-height: 190px;
  }

  .small-wrap,
  .large-wrap {
    display: grid;
    place-items: center;
  }

  .small-wrap {
    width: 76px;
    height: 76px;
    border-radius: 14px;
    background: #141416;
  }

  .large-wrap { min-height: 170px; }

  .mascot {
    display: block;
    overflow: visible;
  }

  .mascot.small { width: 64px; height: 64px; }
  .mascot.large { width: 110px; height: 110px; }

  .meta {
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,.07);
  }

  .name {
    margin: 0 0 6px;
    font-size: 16px;
    line-height: 1.3;
    font-weight: 650;
    letter-spacing: 0;
  }

  .tag {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }

  svg #body {
    transform-box: fill-box;
    transform-origin: 50% 72%;
  }

  svg #head {
    transform-box: fill-box;
    transform-origin: 50% 88%;
  }

  svg #eyes {
    transform-box: fill-box;
    transform-origin: 50% 50%;
  }

  svg #ears,
  svg #tail,
  svg #cape,
  svg #paws,
  svg #leaf,
  svg #hat,
  svg #scarf,
  svg #shell,
  svg #side-fins,
  svg #whiskers {
    transform-box: fill-box;
    transform-origin: 50% 70%;
  }

  @media (max-width: 980px) {
    .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  @media (max-width: 660px) {
    main { width: min(100% - 28px, 420px); padding-top: 28px; }
    header { display: block; }
    .note { margin-top: 10px; text-align: left; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
